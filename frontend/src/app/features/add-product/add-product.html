<div class="max-w-2xl mx-auto pt-10">
  <button routerLink="/" class="text-dark-muted hover:text-white flex items-center gap-2 mb-8 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
    </svg>
    Torna alla Dashboard
  </button>

  <div class="bg-dark-surface rounded-[2rem] p-8 md:p-12 shadow-2xl border border-white/5 relative overflow-hidden">
    <!-- Decorative background glow -->
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-500/20 blur-[100px] rounded-full pointer-events-none"></div>

    <h2 class="text-3xl font-bold text-white mb-2 relative z-10">Genera Nuovo Tracker</h2>
    <p class="text-dark-muted mb-8 relative z-10">Incolla l'URL del prodotto Amazon o Temu. L'intelligenza artificiale estrarrà i dati ignorando le protezioni CSS.</p>

    <form (ngSubmit)="onSubmit()" #form="ngForm" class="relative z-10">
      <div class="mb-6">
        <label for="url" class="block text-sm font-medium text-dark-muted mb-2">URL Prodotto</label>
        <div class="relative">
          <input 
            type="url" 
            id="url"
            name="url"
            [(ngModel)]="url"
            required
            pattern="https?://.*"
            placeholder="https://www.amazon.it/dp/B0..."
            class="w-full bg-dark-bg border border-white/10 text-white rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all placeholder:text-dark-muted/50 text-lg"
            [disabled]="loading"
          >
          <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-dark-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
            </svg>
          </div>
        </div>
        <div *ngIf="form.submitted && url.length === 0" class="text-red-400 text-sm mt-2">L'URL è obbligatorio.</div>
      </div>

      <div class="mb-6">
        <label for="chatId" class="block text-sm font-medium text-dark-muted mb-2">Telegram Chat ID (Opzionale)</label>
        <input 
          type="text" 
          id="chatId"
          name="chatId"
          [(ngModel)]="chatId"
          placeholder="es. 1048168499"
          class="w-full bg-dark-bg border border-white/10 text-white rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-primary-500/50 focus:border-primary-500 transition-all placeholder:text-dark-muted/50 text-lg"
          [disabled]="loading"
        >
        <p class="text-xs text-dark-muted mt-2">
          Non sai qual è il tuo ID? 
          <a href="https://t.me/userinfobot" target="_blank" class="text-emerald-500 hover:text-emerald-400 transition-colors underline">Scoprilo in 1 clic qui</a>
        </p>
      </div>

      <div *ngIf="error" class="mb-6 bg-red-500/10 border border-red-500/30 text-red-500 text-sm p-4 rounded-xl">
        {{ error }}
      </div>

      <button 
        type="submit" 
        [disabled]="loading || !form.valid"
        class="w-full flex items-center justify-center py-4 px-6 bg-primary-600 hover:bg-primary-500 text-white font-medium rounded-xl transition-all shadow-lg shadow-primary-500/25 disabled:opacity-50 disabled:cursor-not-allowed group"
      >
        <div *ngIf="loading" class="flex flex-col items-center justify-center gap-1 pt-1">
          <div class="flex items-center gap-3">
            <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div>
            <span class="animate-pulse font-semibold">Analisi pagina Amazon in corso...</span>
          </div>
          <span class="text-xs text-white/80 font-normal mt-1">Potrebbe richiedere qualche secondo per superare i captcha.</span>
        </div>
        <span *ngIf="!loading" class="flex items-center gap-2">
          Estrai Dati e Inizia Tracking
          <svg class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
          </svg>
        </span>
      </button>
    </form>
  </div>
</div>
